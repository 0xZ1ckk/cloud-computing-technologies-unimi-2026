server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /users/${segment}
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/tickets/**
        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/notifications/**

app:
  jwt:
    secret: dGhpcy1pcy1hLWRlbW8tc2VjcmV0LWtleS0zMi1ieXRlcy1sb25n
  rate-limit:
    capacity: 5
    refill-seconds: 60
  ticket-service:
    instances:
      - http://localhost:8082
      - http://localhost:8084
